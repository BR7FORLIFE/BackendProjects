services:
  postgres: 
    image: postgres:17
    container_name: nestjsDB
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql
    environment: 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_DB: ${POSTGRES_DB}
  
volumes:
  pgdata: