services:
  postgres:
    image: postgres:17
    container_name: products-db
    ports: 
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - products-networks
    env_file:
      - .env
    volumes: 
     - pg_data:/var/lib/postgresql/data
    
  product-service:
    build: ./Dockerfile
    networks:
      - products-networks

volumes:
  pg_data:

networks: 
  products-networks: