spring:
  application:
    name: LiveProductLive

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    
  data: 
    redis: 
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

app:
  kafka:
    bootstrap-server: ${KAFKA_BOOTSTRAP_SERVER}
    product-view-topic: ${KAFKA_TOPIC_NAME}
    consumer-group: ${KAFKA_CONSUMER_GROUP_NAME}