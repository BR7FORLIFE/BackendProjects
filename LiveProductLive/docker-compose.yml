services: 
  postgres:
    image: postgres:17
    container_name: live-product-postgres
    ports: 
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes: 
      - pgdata:/var/lib/postgresql/data

  redis: 
    image: redis:8
    container_name: live-product-redis
    ports: 
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes: 
     - redis_data:/data

volumes: 
  pgdata: 
  redis_data: